<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ساعت جهانی | نمایش زمان چندین منطقه زمانی</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a2f3a 0%, #0a1a1f 100%);
            font-family: 'Segoe UI', 'Tahoma', 'Vazirmatn', system-ui, -apple-system, 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* کارت اصلی */
        .world-clock-card {
            max-width: 1300px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 24px 28px 36px 28px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.2);
            transition: all 0.2s ease;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #F9F3D9, #FFE6B0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
            margin-bottom: 12px;
        }

        .sub {
            text-align: center;
            color: #cbe4e8;
            font-size: 0.95rem;
            border-bottom: 1px dashed rgba(255,255,240,0.3);
            display: inline-block;
            width: auto;
            margin: 0 auto 25px auto;
            padding-bottom: 8px;
            font-weight: 400;
        }

        .clock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin: 20px 0 30px 0;
        }

        /* کارت هر شهر */
        .city-card {
            background: rgba(20, 35, 45, 0.75);
            backdrop-filter: blur(4px);
            border-radius: 32px;
            padding: 18px 20px 22px 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 18px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,245,200,0.25);
        }

        .city-card:hover {
            transform: translateY(-5px);
            background: rgba(30, 50, 60, 0.85);
            border-color: rgba(255,215,130,0.6);
            box-shadow: 0 15px 28px rgba(0,0,0,0.4);
        }

        .city-name {
            font-size: 1.7rem;
            font-weight: 700;
            color: #FFE6B0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            border-right: 4px solid #FFB347;
            padding-right: 15px;
        }

        .utc-offset {
            font-size: 0.75rem;
            background: #1F3E48;
            padding: 4px 12px;
            border-radius: 60px;
            font-weight: normal;
            color: #C7F0F2;
            letter-spacing: 0.5px;
        }

        .time-display {
            font-family: 'Courier New', 'Fira Mono', monospace;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: #00000030;
            padding: 12px 12px;
            border-radius: 28px;
            margin: 15px 0 12px 0;
            text-align: center;
            color: #F5F9FF;
            text-shadow: 0 0 5px #00b7ff55;
            word-break: break-word;
        }

        .date-info {
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            color: #BDD9DD;
            margin-top: 8px;
            flex-wrap: wrap;
            gap: 6px;
        }

        .weekday {
            font-weight: 500;
            background: #0e2a2f80;
            padding: 4px 12px;
            border-radius: 25px;
        }

        .full-date {
            font-family: monospace;
            font-size: 0.85rem;
        }

        .live-badge {
            font-size: 0.7rem;
            background: #37b48b30;
            border-radius: 30px;
            padding: 2px 10px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #C2F2E4;
        }

        .live-dot {
            display: inline-block;
            width: 9px;
            height: 9px;
            background-color: #2ecc71;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 4px #2ecc71;
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.8);}
            100% { opacity: 1; transform: scale(1.2);}
        }

        footer {
            text-align: center;
            font-size: 0.75rem;
            color: #AEC3CA;
            border-top: 1px solid rgba(255,215,150,0.3);
            padding-top: 20px;
            margin-top: 10px;
        }

        @media (max-width: 640px) {
            .world-clock-card {
                padding: 18px;
            }
            .time-display {
                font-size: 1.9rem;
            }
            .city-name {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
<div class="world-clock-card">
    <h1>🌍 ساعت جهانی</h1>
    <div style="text-align: center;">
        <div class="live-badge"><span class="live-dot"></span> بروزرسانی لحظه‌ای</div>
        <div class="sub">زمان هماهنگ در شهرهای مهم جهان</div>
    </div>

    <div id="clockContainer" class="clock-grid">
        <!-- دینامیک توسط جاوااسکریپت -->
        <div style="text-align: center; grid-column: 1/-1; color: #eee;">بارگذاری زمان‌ها ...</div>
    </div>
    <footer>
        ⏱️ زمان بر اساس مرجع UTC | تمامی ساعت‌ها مطابق با زمان واقعی سیستم شما بروز می‌شوند
    </footer>
</div>

<script>
    // تعریف شهرها و مناطق زمانی (به صورت IANA zone name)
    const cities = [
        { name: "🇺🇸 نیویورک", timezone: "America/New_York", label: "US/Eastern" },
        { name: "🇬🇧 لندن", timezone: "Europe/London", label: "GMT/BST" },
        { name: "🇮🇷 تهران", timezone: "Asia/Tehran", label: "IRST (UTC+3:30)" },
        { name: "🇦🇪 دبی", timezone: "Asia/Dubai", label: "GST +4" },
        { name: "🇯🇵 توکیو", timezone: "Asia/Tokyo", label: "JST +9" },
        { name: "🇦🇺 سیدنی", timezone: "Australia/Sydney", label: "AEST/AEDT" },
        { name: "🇩🇪 برلین", timezone: "Europe/Berlin", label: "CET/CEST" },
        { name: "🇨🇦 ونکوور", timezone: "America/Vancouver", label: "PST/PDT" },
        { name: "🇮🇳 دهلی نو", timezone: "Asia/Kolkata", label: "IST +5:30" },
        { name: "🇧🇷 سائوپائولو", timezone: "America/Sao_Paulo", label: "BRT/BRST" },
        { name: "🇿🇦 ژوهانسبورگ", timezone: "Africa/Johannesburg", label: "SAST +2" },
        { name: "🇷🇺 مسکو", timezone: "Europe/Moscow", label: "MSK +3" }
    ];

    // تابع برای فرمت‌دهی زیبای اعداد دو رقمی
    function formatTwoDigit(num) {
        return num < 10 ? '0' + num : num;
    }

    // تابع برای تبدیل Date به تاریخ شمسی (برای نمایش بهتر و تطابق با مناطق مختلف از Gregorian استفاده می‌کنیم ولی اسم روز و تاریخ میلادی)
    // برای ایران می‌توانیم روز هفته و تاریخ میلادی را نشان دهیم. (تمامی شهرها به صورت میلادی نمایش داده می‌شوند تا همگانی باشد)
    function getFormattedDateTime(dateObj) {
        const year = dateObj.getFullYear();
        const month = formatTwoDigit(dateObj.getMonth() + 1);
        const day = formatTwoDigit(dateObj.getDate());
        const hours = formatTwoDigit(dateObj.getHours());
        const minutes = formatTwoDigit(dateObj.getMinutes());
        const seconds = formatTwoDigit(dateObj.getSeconds());
        
        const weekdays = ["یکشنبه", "دوشنبه", "سه‌شنبه", "چهارشنبه", "پنجشنبه", "جمعه", "شنبه"];
        const weekdayName = weekdays[dateObj.getDay()];
        
        const timeString = `${hours}:${minutes}:${seconds}`;
        const dateString = `${year}/${month}/${day}`;
        
        return { timeString, dateString, weekdayName };
    }

    // تابع محاسبه و رندرینگ همه کارت‌ها
    function updateAllClocks() {
        const container = document.getElementById('clockContainer');
        if (!container) return;
        
        let html = '';
        
        for (const city of cities) {
            try {
                // ایجاد آبجکت تاریخ با منطقه زمانی مورد نظر
                // استفاده از Intl.DateTimeFormat برای بدست آوردن تاریخ و زمان صحیح در هر منطقه
                const formatterTime = new Intl.DateTimeFormat('fa-IR', {
                    timeZone: city.timezone,
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false
                });
                
                const formatterDate = new Intl.DateTimeFormat('fa-IR', {
                    timeZone: city.timezone,
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit'
                });
                
                const formatterWeekday = new Intl.DateTimeFormat('fa-IR', {
                    timeZone: city.timezone,
                    weekday: 'long'
                });
                
                // دریافت زمان کامل به صورت آبجکت Date برای محاسبه offset بهتر (اختیاری)
                // برای بدست آوردن UTC offset می‌توانیم از لحظه فعلی و تبدیل استفاده کنیم.
                const nowUtc = new Date();
                const localDateInZone = new Date(nowUtc.toLocaleString("en-US", { timeZone: city.timezone }));
                const offsetMinutes = - (localDateInZone.getTimezoneOffset()); // offset نسبت به UTC بر حسب دقیقه (علامت +-)
                const offsetHours = Math.floor(Math.abs(offsetMinutes) / 60);
                const offsetMinsRem = Math.abs(offsetMinutes) % 60;
                let offsetSign = offsetMinutes >= 0 ? '+' : '-';
                let offsetStr = `UTC ${offsetSign}${offsetHours}`;
                if (offsetMinsRem !== 0) offsetStr += `:${formatTwoDigit(offsetMinsRem)}`;
                
                // زمان و تاریخ زیبا
                const timePart = formatterTime.format(nowUtc);
                const datePart = formatterDate.format(nowUtc);
                const weekdayName = formatterWeekday.format(nowUtc);
                
                // نمایش اختلاف سفارشی برای تهران و دهلی که نیم ساعته
                let displayOffset = city.label ? city.label : offsetStr;
                if (city.name.includes("تهران")) displayOffset = "UTC+3:30 (IRST)";
                if (city.name.includes("دهلی")) displayOffset = "UTC+5:30 (IST)";
                
                html += `
                    <div class="city-card">
                        <div class="city-name">
                            <span>${city.name}</span>
                            <span class="utc-offset">${displayOffset}</span>
                        </div>
                        <div class="time-display">${timePart}</div>
                        <div class="date-info">
                            <span class="weekday">${weekdayName}</span>
                            <span class="full-date">📅 ${datePart}</span>
                        </div>
                        <div style="font-size: 0.7rem; text-align: left; margin-top: 8px; opacity:0.7;">🌐 ${city.timezone}</div>
                    </div>
                `;
            } catch (err) {
                console.warn(`خطا در منطقه زمانی ${city.timezone}`, err);
                // در صورت خطا، کارت خطا نمایش دهد
                html += `
                    <div class="city-card" style="background:#5a2e2e80;">
                        <div class="city-name">
                            <span>${city.name}</span>
                            <span class="utc-offset">⚠️ خطا</span>
                        </div>
                        <div class="time-display">--:--:--</div>
                        <div class="date-info">منطقه زمانی پشتیبانی نمی‌شود</div>
                    </div>
                `;
            }
        }
        
        container.innerHTML = html;
    }
    
    // اجرای اولیه
    updateAllClocks();
    
    // آپدیت هر ثانیه برای نمایش ثانیه‌ها
    let intervalId = setInterval(() => {
        updateAllClocks();
    }, 1000);
    
    // پاکسازی اینتروال در صورت نیاز (اختیاری اما برای Single Page App ها خوبه)
    window.addEventListener('beforeunload', () => {
        if (intervalId) clearInterval(intervalId);
    });
    
    // گزینه اضافه: در صورت عدم پشتیبانی از timezone در مرورگرهای قدیمی پیام مناسب
    if (typeof Intl === 'undefined' || !Intl.DateTimeFormat || typeof Intl.DateTimeFormat().resolvedOptions === 'undefined') {
        const container = document.getElementById('clockContainer');
        if(container) {
            container.innerHTML = '<div style="grid-column:1/-1; background:#b91c1c; padding:20px; border-radius:28px;">⚠️ مرورگر شما از مناطق زمانی بین‌المللی پشتیبانی کامل نمی‌کند. لطفاً مرورگر خود را به روز کنید.</div>';
            if(intervalId) clearInterval(intervalId);
        }
    }
</script>
</body>
</html>
